name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: persona16_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d persona16_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PERSONA16_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/persona16_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test, including PostgreSQL integration
        run: pnpm test

      - name: Build web application
        run: pnpm --filter @persona16/web build

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate
